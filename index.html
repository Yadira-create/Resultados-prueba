<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIMET - Resultados PUI</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            padding: 35px 25px;
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        /* Contenedor del Logo de la UNIMET */
        .logo-unimet {
            max-width: 180px;
            height: auto;
            margin-bottom: 20px;
        }

        h1 {
            color: #003366; /* Azul UNIMET */
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .trimestre {
            color: #e06613; /* Naranja UNIMET */
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        p.instruction {
            color: #666666;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #cccccc;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 18px;
            outline: none;
            text-align: center;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #e06613;
        }

        button {
            width: 100%;
            background-color: #e06613; /* Naranja corporativo */
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 20px;
        }

        button:hover {
            background-color: #c9550c;
        }

        .result-box {
            display: none;
            border-radius: 8px;
            padding: 16px;
            font-size: 16px;
            margin-top: 10px;
        }

        .success {
            background-color: #e8f5e9; /* Cuadro verde de la captura */
            border: 1px solid #c8e6c9;
            color: #1b5e20;
            font-weight: 700;
            line-height: 1.5;
        }

        .error {
            background-color: #ffebee;
            border: 1px solid #ffcdd2;
            color: #b71c1c;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Logo Oficial de la UNIMET -->
    <img src="https://www.unimet.edu.ve/unimet/wp-content/uploads/2022/10/logo-unimet-horizontal.png" alt="Logo UNIMET" class="logo-unimet">
    
    <h1>Resultados PUI Regulares</h1>
    <div class="trimestre">Trimestre 2526-3</div>
    
    <p class="instruction">Ingresa tu número de cédula para consultar<br>tu nivel asignado.</p>
    
    <input type="text" id="cedulaInput" placeholder="Ej: 30408011" onkeypress="handleKeyPress(event)">
    <button onclick="consultarNivel()">Consultar</button>
    
    <div id="result" class="result-box"></div>
</div>

<script>
    // Base de datos de estudiantes
    const listaResultados = {
      "13444751": "Inglés I",
      "32695949": "Inglés I",
      "32635719": "Inglés I",
      "30408011": "Inglés I",
      "31961476": "Inglés I",
      "31784294": "Inglés I",
      "31769146": "Inglés I",
      "32536807": "Inglés II",
      "32286431": "Inglés II",
      "33157492": "Inglés II",
      "31649258": "Inglés II",
      "31065166": "Inglés II",
      "32378942": "Inglés II",
      "31885623": "Inglés II",
      "31664104": "Inglés II",
      "31991465": "Inglés II",
      "32115667": "Inglés III",
      "32219904": "Inglés III",
      "32210744": "Inglés III",
      "32517865": "Inglés III",
      "31968853": "Inglés III",
      "32024503": "Inglés III",
      "31535492": "Inglés III",
      "31913959": "Inglés III",
      "31885994": "Inglés III",
      "31533722": "Inglés III",
      "32014603": "Inglés IV",
      "31168434": "Inglés IV",
      "32120021": "Inglés IV",
      "31245648": "Inglés IV",
      "31792694": "Inglés IV",
      "31566613": "Inglés IV",
      "31766603": "Inglés IV",
      "32424911": "Inglés IV",
      "31911425": "Inglés V",
      "31958617": "Inglés V",
      "31163458": "Inglés V",
      "31124483": "Inglés V",
      "31912852": "Inglés V",
      "30501869": "Inglés V",
      "31473210": "Inglés V",
      "31238604": "Inglés V",
      "31615599": "Exento",
      "31618236": "Exento",
      "31379435": "Exento",
      "31501582": "Exento",
      "31481525": "Exento",
      "31140920": "Exento",
      "31317457": "Exento"
    };

    function consultarNivel() {
        const input = document.getElementById('cedulaInput').value.trim();
        const resultDiv = document.getElementById('result');
        
        // Elimina puntos o guiones automáticamente por si acaso
        const cedulaLimpia = input.replace(/\./g, '').replace(/-/g, '');

        if (cedulaLimpia === "") {
            resultDiv.className = "result-box error";
            resultDiv.innerHTML = "Por favor, ingresa un número de cédula.";
            resultDiv.style.display = "block";
            return;
        }

        if (listaResultados.hasOwnProperty(cedulaLimpia)) {
            const nivel = listaResultados[cedulaLimpia];
            resultDiv.className = "result-box success";
            
            if(nivel.toLowerCase() === "exento") {
                resultDiv.innerHTML = "Resultado de tu consulta:<br><span style='font-size: 20px; display:block; margin-top:5px;'>Te encuentras: <strong>EXENTO</strong></span>";
            } else {
                resultDiv.innerHTML = "Te corresponde cursar:<br><span style='font-size: 22px; display:block; margin-top:5px;'><strong>" + nivel + "</strong></span>";
            }
        } else {
            resultDiv.className = "result-box error";
            resultDiv.innerHTML = "Cédula no encontrada. Por favor, verifica el número o comunícate con el Departamento de Inglés.";
        }
        
        resultDiv.style.display = "block";
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") {
            consultarNivel();
        }
    }
</script>

</body>
</html>
